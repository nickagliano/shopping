[package]
name        = "shopping"
version     = "0.2.0"
description = "Personal deal-watcher harness — maintain a watchlist, poll marketplaces, get notified when leads appear."
authors     = ["nickagliano"]
license     = "MIT"
repository  = "https://github.com/nickagliano/shopping"
platforms   = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]

[eps]
customization_guide = "CUSTOMIZE.md"
hooks_dir           = "hooks/"

[hooks]
install   = "hooks/install.sh"
configure = "hooks/configure.sh"

[service]
enabled      = true
start        = "./serve.sh"
port         = 5555
health_check = "GET /health"

[ports]
# watchlist: path to the JSON file describing items you're hunting for.
# Each entry has: name, keywords[], max_price (optional), notes (optional).
watchlist = "watchlist.json"

# leads_store: where found leads are persisted between runs.
leads_store = "leads.json"

# notifier: how you're alerted when a good lead appears.
# Default: plugins/notify/stdout.js (prints to terminal / logs)
# Swap for: plugins/notify/macos_notification.js, slack.js, email.js
notifier = "plugins/notify/stdout.js"

# check_interval_minutes: how often to poll all marketplaces.
# Default: 120 minutes (2 hours). Most marketplaces don't need more frequent checks.
check_interval_minutes = 120

# marketplaces_dir: directory scanned for marketplace plugins (auto-discovered).
# Drop any file exporting { search(query, options) -> Lead[] } and it runs.
marketplaces_dir = "plugins/marketplaces/"
